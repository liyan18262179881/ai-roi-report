<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 赋能商业计划报告生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --ink:#111;--ink2:#3a3a3a;--gray:#666;--faint:#999;
  --bg:#EDEBE6;--paper:#fff;--line:#111;--hair:#D8D6CF;--hair2:#E8E6E0;--soft:#F4F2EC;
  --todo:#8a5a00;--todobg:#FBF3E2;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Source Serif 4',Georgia,'Songti SC',serif;
  --sans:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
.side{width:300px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--hair);position:sticky;top:0;height:100vh;overflow-y:auto;padding:26px 22px}
.side .logo{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;color:var(--gray);text-transform:uppercase;margin-bottom:6px}
.side h1{font-size:17px;font-weight:700;letter-spacing:-0.01em;margin-bottom:20px;line-height:1.3}
.cfg-grp{margin-bottom:20px}
.cfg-grp .gl{font-size:11px;font-weight:600;color:var(--gray);font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:10px}
.cfg-fld{margin-bottom:11px}
.cfg-fld label{display:block;font-size:12px;color:var(--ink2);margin-bottom:5px}
.cfg-fld input,.cfg-fld select{width:100%;padding:9px 11px;font-size:13px;border:1px solid var(--hair);border-radius:8px;background:var(--soft);color:var(--ink);font-family:var(--sans)}
.cfg-fld input:focus,.cfg-fld select:focus{outline:none;border-color:var(--ink)}
.cfg-fld input.mono{font-family:var(--mono)}
.dir-list{display:flex;flex-direction:column;gap:7px}
.dir{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--hair);border-radius:9px;cursor:pointer;transition:.15s;background:var(--soft)}
.dir:hover{border-color:var(--gray)}
.dir.on{border-color:var(--ink);background:#fff;box-shadow:inset 3px 0 0 var(--ink)}
.dir input{width:15px;height:15px;accent-color:var(--ink);flex-shrink:0;cursor:pointer}
.dir .di{font-size:15px}.dir .dn{font-size:13px;font-weight:500;flex:1}
.dir .dt{font-family:var(--mono);font-size:9px;color:var(--faint);padding:2px 6px;border:1px solid var(--hair);border-radius:4px}
.main{flex:1;min-width:0;overflow-x:hidden}
.main-inner{max-width:840px;margin:0 auto;padding:34px 40px 100px}
.mode-bar{display:flex;gap:10px;align-items:center;margin-bottom:24px}
.mode-bar .mt{font-size:13px;color:var(--gray);font-family:var(--mono)}
.btn-ghost{margin-left:auto;padding:8px 14px;border:1px solid var(--hair);background:var(--paper);border-radius:8px;font-size:12.5px;cursor:pointer;font-family:var(--sans);color:var(--ink2)}
.btn-ghost:hover{border-color:var(--ink)}
.section-lead{font-size:13px;color:var(--gray);margin-bottom:18px;line-height:1.6}
.pcard{background:var(--paper);border:1px solid var(--hair);border-radius:13px;padding:18px 20px;margin-bottom:13px}
.pcard-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pcard-h .pi{font-size:17px}.pcard-h .pn{font-weight:600;font-size:15px;flex:1}
.pcard-h .pt{font-family:var(--mono);font-size:10px;padding:3px 8px;border:1px solid var(--hair);border-radius:5px;color:var(--gray)}
.pcard .pb{font-size:11.5px;color:var(--faint);margin-bottom:14px;line-height:1.5}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.pfld label{display:block;font-size:12px;color:var(--ink2);margin-bottom:5px}
.pfld .row{display:flex;align-items:center;gap:7px}
.pfld input{flex:1;width:100%;padding:9px 10px;font-size:14px;font-family:var(--mono);border:1px solid var(--hair);border-radius:8px;background:var(--soft);color:var(--ink);min-width:0}
.pfld input:focus{outline:none;border-color:var(--ink)}
.pfld .u{font-size:11px;color:var(--faint);font-family:var(--mono);min-width:22px}
.empty-hint{text-align:center;padding:50px 20px;color:var(--faint);font-size:14px;border:1px dashed var(--hair);border-radius:13px}
.gen-wrap{text-align:center;margin-top:26px}
.gen-btn{padding:14px 40px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;letter-spacing:0.02em}
.gen-btn:hover{background:#000}.gen-btn:disabled{background:var(--faint);cursor:not-allowed}
.gen-note{font-size:11.5px;color:var(--faint);margin-top:10px}
#report{display:none}
.report-doc{background:var(--paper);border:1px solid var(--hair);border-radius:4px;padding:64px 72px}
.todo{color:var(--todo);background:var(--todobg);padding:1px 6px;border-radius:4px;font-size:0.92em;font-family:var(--sans)}
.inc-banner{border:1px solid var(--todo);background:var(--todobg);border-radius:8px;padding:13px 16px;margin-bottom:30px;font-size:13px;color:var(--todo)}
.rep-cover{border-bottom:2px solid var(--ink);padding-bottom:32px;margin-bottom:40px}
.rep-cover .rc-doc{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:var(--gray);text-transform:uppercase;margin-bottom:24px}
.rep-cover h1{font-family:var(--serif);font-size:38px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;margin-bottom:6px}
.rep-cover .rc-sub{font-family:var(--serif);font-size:20px;color:var(--ink2);font-weight:400;margin-bottom:24px}
.rep-meta{display:flex;flex-wrap:wrap;gap:0;font-family:var(--mono);font-size:11.5px;color:var(--gray);border-top:1px solid var(--hair);padding-top:16px}
.rep-meta .rm{padding-right:28px;border-right:1px solid var(--hair);margin-right:28px;margin-bottom:8px}
.rep-meta .rm:last-child{border-right:none}
.rep-meta .rm b{display:block;color:var(--ink);font-weight:700;font-size:13px;margin-top:2px}
.rep-sec{margin-bottom:42px}
.rep-sec h2{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:-0.01em;padding-bottom:10px;border-bottom:1px solid var(--ink);margin-bottom:18px;display:flex;align-items:baseline;gap:12px}
.rep-sec h2 .sn{font-family:var(--mono);font-size:13px;color:var(--gray);font-weight:500}
.rep-sec h3{font-size:15px;font-weight:600;margin:22px 0 10px}
.rep-sec p{font-size:14px;color:var(--ink2);margin:11px 0;line-height:1.75}
.rep-sec strong{color:var(--ink);font-weight:600}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--ink);margin:20px 0}
.kpi{padding:18px 14px;border-right:1px solid var(--hair);text-align:center}
.kpi:last-child{border-right:none}
.kpi .kv{font-family:var(--mono);font-size:19px;font-weight:700;letter-spacing:-0.02em}
.kpi .kl{font-size:10.5px;color:var(--gray);margin-top:5px}
table.rep{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
table.rep th{text-align:left;padding:9px 12px;border-bottom:2px solid var(--ink);font-weight:700;font-size:12px}
table.rep th.r,table.rep td.r{text-align:right;font-family:var(--mono)}
table.rep td{padding:9px 12px;border-bottom:1px solid var(--hair);color:var(--ink2)}
table.rep tr.sum td{border-top:1px solid var(--ink);border-bottom:none;font-weight:700;color:var(--ink)}
table.rep tr.sum td.r{font-family:var(--mono)}
.vs-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0}
.vs-col{border:1px solid var(--ink);padding:18px 20px}
.vs-col h4{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:4px}
.vs-col .vtag{font-family:var(--mono);font-size:10px;color:var(--gray);margin-bottom:12px}
.vs-col .vl{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--hair)}
.vs-col .vl:last-of-type{border-bottom:none}
.vs-col .vl .vk{color:var(--gray)}.vs-col .vl .vv{font-family:var(--mono);font-weight:600;color:var(--ink)}
.vs-col .vbig{font-family:var(--mono);font-size:22px;font-weight:700;margin:10px 0 2px}
.vs-col .vpro{font-size:12px;color:var(--ink2);margin-top:10px;line-height:1.5}
.arch{border:1px solid var(--hair);border-radius:8px;padding:16px 18px;margin:12px 0}
.arch .ah{font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.arch .ar{display:flex;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--hair2)}
.arch .ar:last-child{border-bottom:none}
.arch .ar .ak{color:var(--gray);min-width:96px}.arch .ar .av{color:var(--ink2);flex:1}
.arch .ar .av .mono{font-family:var(--mono)}
.timeline{margin:16px 0}
.tl{display:flex;gap:16px;padding:13px 0;border-bottom:1px solid var(--hair)}
.tl:last-child{border-bottom:none}
.tl .tp{font-family:var(--mono);font-size:11px;font-weight:700;min-width:90px;padding-top:2px}
.tl .tc .tt{font-weight:600;font-size:13.5px}
.tl .tc .td{font-size:12.5px;color:var(--gray);margin-top:3px;line-height:1.55}
.risk-tbl td:first-child{white-space:nowrap;font-weight:600;color:var(--ink)}
.concl{border:1px solid var(--ink);padding:20px 22px;margin-top:8px}
.concl ol{margin:8px 0 0 18px;font-size:14px;color:var(--ink2)}
.concl ol li{padding:5px 0}
.foot{margin-top:48px;padding-top:18px;border-top:1px solid var(--hair);font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.7}
@media print{
  body{background:#fff}.side,.mode-bar{display:none!important}
  .main-inner{max-width:none;padding:0}.report-doc{border:none;border-radius:0;padding:0}
  .rep-sec{break-inside:avoid;page-break-inside:avoid}.rep-cover{break-after:avoid}h2{break-after:avoid}
}
@media(max-width:880px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--hair)}
  .main-inner{padding:24px 18px 80px}.report-doc{padding:32px 22px}
  .rep-cover h1{font-size:28px}.kpi-row{grid-template-columns:repeat(2,1fr)}.kpi:nth-child(2){border-right:none}
  .vs-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="logo">Business Plan Generator</div>
    <h1>AI 赋能商业<br>计划报告生成器</h1>
    <div class="cfg-grp">
      <div class="gl">① 公司信息</div>
      <div class="cfg-fld"><label>品牌 / 公司名 <span style="color:var(--faint)">(可空)</span></label><input id="co_name" type="text" value="" placeholder="选填"></div>
      <div class="cfg-fld"><label>所属行业 <span style="color:var(--faint)">(可空)</span></label>
        <select id="co_ind">
          <option value="">未填写</option>
          <option>服饰 / 鞋包</option><option>美妆 / 个护</option><option>3C / 数码</option>
          <option>食品 / 生鲜</option><option>家居 / 百货</option><option>综合电商</option>
        </select>
      </div>
      <div class="cfg-fld"><label>公司总人数 <span style="color:var(--faint)">(可空)</span></label><input id="co_size" class="mono" type="number" value="" placeholder="选填"></div>
    </div>
    <div class="cfg-grp">
      <div class="gl">② 赋能方向(可多选)</div>
      <div class="dir-list" id="dir_list">
        <label class="dir on"><input type="checkbox" data-k="vis" checked onchange="syncDirs()"><span class="di">🎨</span><span class="dn">视觉 / 设计</span><span class="dt">降本+增效</span></label>
        <label class="dir on"><input type="checkbox" data-k="cs" checked onchange="syncDirs()"><span class="di">🎧</span><span class="dn">客服</span><span class="dt">降本</span></label>
        <label class="dir on"><input type="checkbox" data-k="sale" checked onchange="syncDirs()"><span class="di">📈</span><span class="dn">销售 / 运营</span><span class="dt">增收</span></label>
        <label class="dir on"><input type="checkbox" data-k="kb" checked onchange="syncDirs()"><span class="di">📚</span><span class="dn">内部知识库</span><span class="dt">降本</span></label>
        <label class="dir on"><input type="checkbox" data-k="hr" checked onchange="syncDirs()"><span class="di">👥</span><span class="dn">HR / 人事</span><span class="dt">降本</span></label>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-inner">
      <div id="config">
        <div class="mode-bar"><span class="mt">② 填写各方向参数</span></div>
        <p class="section-lead">只填你能说出口的:人数、薪资、业务量。提效系数(产能倍数、AI 处理率等)已按 2026 行业基准设好,报告里会注明,你不用填。没把握的可空着,空的标「待补充」且不计入合计。</p>
        <div id="param_cards"></div>
        <div class="gen-wrap">
          <button class="gen-btn" id="genBtn" onclick="generate()">生成商业计划报告 →</button>
          <div class="gen-note">含「自建 vs 外包」投入对比 · 空字段不编造</div>
        </div>
      </div>
      <div id="report">
        <div class="mode-bar">
          <span class="mt">商业计划报告</span>
          <button class="btn-ghost" onclick="backToEdit()">← 返回编辑</button>
          <button class="btn-ghost" onclick="exportPDF()" id="pdfBtn">导出 PDF</button>
        </div>
        <div class="report-doc" id="report_doc"></div>
      </div>
    </div>
  </main>
</div>

<script>
/* 系数(coef)藏后台,按 2026 行业基准;用户只填 params */
const SC={
  vis:{icon:'🎨',name:'视觉 / 设计',type:'降本+增效',bench:'按行业基准:AI 出图后产能提升 2.5 倍(2026)。',
    params:[{id:'vis_n',label:'团队人数',u:'人'},{id:'vis_sal',label:'人均月薪',u:'元'},{id:'vis_vol',label:'月出图量',u:'件'}],
    coef:{boost:2.5},
    deploy:'自建出图编排(ComfyUI / Agent)+ 图片生成 API',model:'通义万相 / 即梦(图)+ qwen(文案)',unit:'件',price:0.10,build:[15000,35000],
    weeks:[['第1周','盘点 SKU 类目与主图/详情页风格基线'],['第2周','训练品牌风格 LoRA + 提示词库'],['第3-4周','搭出图编排:SKU→文案→配图→质检'],['第5周','多平台尺寸适配 + 批量测试'],['第6周','人工审核流程 + 出图看板交付']]},
  cs:{icon:'🎧',name:'客服',type:'降本',bench:'按行业基准:AI 自动处理 45%(2026 现实 20–30%、标杆 60%+ 的稳健取值)。',
    params:[{id:'cs_n',label:'团队人数',u:'人'},{id:'cs_sal',label:'人均月薪',u:'元'},{id:'cs_vol',label:'月对话量',u:'次'}],
    coef:{auto:45},
    deploy:'接入对话平台 / 自建 RAG 知识库 + 转人工兜底',model:'通义晓蜜 / 自建(qwen + 向量检索)',unit:'次',price:0.012,build:[20000,40000],
    weeks:[['第1周','导出高频工单 Top50,梳理标准应答'],['第2周','建商品/售后知识库 + 向量检索'],['第3-4周','搭多轮对话 Agent + 转人工规则'],['第5周','灰度上线,先接简单咨询跑准确率'],['第6周','逐步提自动接待比例 + 看板交付']]},
  sale:{icon:'📈',name:'销售 / 运营',type:'增收',bench:'按行业基准:AI 辅助带来约 12% 营收增量(2026 区间 8–15%)。',
    params:[{id:'sale_rev',label:'月均营收',u:'万'},{id:'sale_margin',label:'毛利率',u:'%',ph:'20-30'},{id:'sale_vol',label:'月生成内容',u:'条'}],
    coef:{up:12},
    deploy:'AI 文案/选品/客户跟进工具 + CRM 集成',model:'大模型 + 数据分析 + CRM 接口',unit:'条',price:0.006,build:[15000,30000],
    weeks:[['第1周','梳理高转化话术、爆品规律、客户分层'],['第2周','搭 AI 文案/选品助手'],['第3-4周','客户跟进提醒 + 智能推荐接 CRM'],['第5周','运营试用,收集转化反馈'],['第6周','规模化 + 效果看板,绑定激励']]},
  kb:{icon:'📚',name:'内部知识库',type:'降本',bench:'按行业基准:AI 问答每次省约 6 分钟查阅时间。',
    params:[{id:'kb_n',label:'覆盖员工',u:'人'},{id:'kb_sal',label:'人均月薪',u:'元'},{id:'kb_q',label:'日均查询/人',u:'次',ph:'3-8'}],
    coef:{save:6},
    deploy:'企业知识库 RAG(文档/SOP/制度向量化)+ 问答入口',model:'qwen / DeepSeek + 向量库',unit:'次查询',price:0.01,build:[15000,30000],
    weeks:[['第1周','盘点制度/SOP/产品文档,统一格式'],['第2周','文档向量化 + 检索调优'],['第3-4周','搭问答 Agent + 权限/引用溯源'],['第5周','灰度试用,补全高频问题'],['第6周','接入飞书/企微入口,全员上线']]},
  hr:{icon:'👥',name:'HR / 人事',type:'降本',bench:'按行业基准:AI 简历初筛+答疑可省约 40% HR 事务人力。',
    params:[{id:'hr_n',label:'HR人数',u:'人'},{id:'hr_sal',label:'人均月薪',u:'元'},{id:'hr_vol',label:'月简历/事务',u:'件'}],
    coef:{save:40},
    deploy:'AI 简历筛选 + 政策问答机器人 + 事务自动化',model:'qwen / DeepSeek + 规则引擎',unit:'件',price:0.01,build:[10000,25000],
    weeks:[['第1周','梳理招聘流程、高频 HR 问答、事务清单'],['第2周','搭简历评分模型 + HR 政策知识库'],['第3-4周','答疑机器人 + 事务流程自动化'],['第5周','试用,校准简历评分准确率'],['第6周','接入 OA/HR 系统,交付培训']]}
};
const ORDER=['vis','cs','sale','kb','hr'];
let active={vis:true,cs:true,sale:true,kb:true,hr:true};

function val(id){const e=document.getElementById(id);if(!e)return null;const s=(''+e.value).trim();if(s==='')return null;const v=parseFloat(s);return isNaN(v)?null:v;}
function money(n){if(n==null||isNaN(n))return null;if(Math.abs(n)>=10000)return (n/10000).toFixed(1)+'万';return Math.round(n).toLocaleString();}
function num(n){if(n==null||isNaN(n))return null;return Math.round(n).toLocaleString();}
const TODO='<span class="todo">待补充</span>';

function syncDirs(){
  document.querySelectorAll('#dir_list input').forEach(cb=>{active[cb.dataset.k]=cb.checked;cb.closest('.dir').classList.toggle('on',cb.checked);});
  renderParams();
  document.getElementById('genBtn').disabled=!ORDER.some(k=>active[k]);
}
function renderParams(){
  const box=document.getElementById('param_cards');
  const act=ORDER.filter(k=>active[k]);
  if(act.length===0){box.innerHTML='<div class="empty-hint">请在左侧至少勾选一个赋能方向</div>';return;}
  box.innerHTML=act.map(k=>{const s=SC[k];return `<div class="pcard">
    <div class="pcard-h"><span class="pi">${s.icon}</span><span class="pn">${s.name}</span><span class="pt">${s.type}</span></div>
    <div class="pb">${s.bench}</div>
    <div class="pgrid">${s.params.map(p=>`<div class="pfld"><label>${p.label}</label><div class="row"><input id="${p.id}" type="number" placeholder="${p.ph||'选填'}"><span class="u">${p.u}</span></div></div>`).join('')}</div>
  </div>`;}).join('');
}

function compute(){
  const r={teams:[],totalMonth:0,totalPeople:0,build:0,api:0,extraRevTotal:0,completeCount:0,incomplete:[]};
  ORDER.forEach(k=>{
    if(!active[k])return;
    const s=SC[k],c=s.coef;
    const complete=s.params.every(p=>val(p.id)!==null);
    let value=null,people=null,vol=null,api=null,extraRev=null,capFrom=null,capTo=null,capExtra=null;
    if(complete){
      if(k==='vis'){const n=val('vis_n'),sal=val('vis_sal');vol=val('vis_vol');people=n*(1-1/c.boost);value=people*sal*1.3;api=vol*s.price;capFrom=vol;capTo=Math.round(vol*c.boost);capExtra=Math.round(vol*(c.boost-1));}
      if(k==='cs'){const n=val('cs_n'),sal=val('cs_sal');vol=val('cs_vol');people=n*(c.auto/100)*0.7;value=people*sal*1.3;api=vol*s.price;}
      if(k==='sale'){const rev=val('sale_rev')*10000,m=val('sale_margin')/100;vol=val('sale_vol');extraRev=rev*(c.up/100);value=extraRev*m;api=vol*s.price;}
      if(k==='kb'){const n=val('kb_n'),sal=val('kb_sal'),q=val('kb_q');const hourly=sal/22/8;vol=n*q*22;value=vol*(c.save/60)*hourly;api=vol*s.price;people=value/(sal*1.3);}
      if(k==='hr'){const n=val('hr_n'),sal=val('hr_sal');vol=val('hr_vol');people=n*(c.save/100);value=people*sal*1.3;api=vol*s.price;}
      r.totalMonth+=value;r.totalPeople+=(people||0);r.build+=s.build[0]+s.build[1];r.api+=api;r.extraRevTotal+=(extraRev||0);r.completeCount++;
    }else{r.incomplete.push(s.name);}
    r.teams.push({k,s,complete,value,people,vol,api,extraRev,capFrom,capTo,capExtra,build:s.build[0]+s.build[1]});
  });
  const cc=r.completeCount;
  if(cc>0){
    /* ===== 投入侧:自建 vs 外包 ===== */
    /* 团队规模随方向数缩放:小场景轻配,多场景重配 */
    const eng=cc>=4?2:1;
    const pmN=cc>=3?1:0.5;                 // 1-2 个场景:产品经理可兼职/半投入
    const dataN=(active.kb||active.cs||active.hr)?1:0.5; // 知识/数据密集场景才需全职数据工程
    const buildMonths=Math.min(6,2+Math.ceil(cc/2));
    const visIn=r.teams.some(t=>t.k==='vis'&&t.complete);
    const teamRows=[
      {role:'AI 产品经理',n:pmN,disp:pmN<1?'0.5 人':'1 人',sal:30000},
      {role:'AI 应用工程师',n:eng,disp:eng+' 人',sal:28000},
      {role:'数据 / 知识工程',n:dataN,disp:dataN<1?'0.5 人':'1 人',sal:15000}
    ];
    if(visIn)teamRows.push({role:'设计 / 视觉',n:1,disp:'1 人',sal:10000});
    const teamMonthly=teamRows.reduce((a,x)=>a+x.n*x.sal,0);
    const selfBuildCost=teamMonthly*buildMonths;
    const selfOpsHR=cc<=1?15000:(cc<=3?25000:40000); // 运维人力随方向数缩放
    const selfFirstYear=selfBuildCost+selfOpsHR*(12-buildMonths)+r.api*12;
    const selfNet=r.totalMonth-selfOpsHR-r.api;
    const selfPay=selfNet>0?Math.ceil(selfBuildCost/selfNet):99;
    const selfRoi=Math.round((r.totalMonth*12-selfFirstYear)/selfFirstYear*100);

    const outOne=r.build;
    const outOps=Math.round((r.api+r.totalMonth*0.05)*1.3);
    const outFirstYear=outOne+outOps*12;
    const outNet=r.totalMonth-outOps;
    const outPay=outNet>0?Math.ceil(outOne/outNet):99;
    const outRoi=Math.round((r.totalMonth*12-outFirstYear)/outFirstYear*100);

    r.self={teamRows,teamMonthly,buildMonths,selfBuildCost,selfOpsHR,selfFirstYear,selfPay,selfRoi,eng};
    r.out={outOne,outOps,outFirstYear,outPay,outRoi};
  }
  return r;
}
